<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEURON — умная викторина</title>
  <style>
    /* Весь CSS остаётся таким же, как в последней версии */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #0b1120 0%, #0a0f1a 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }
    .app-card {
      max-width: 560px;
      width: 100%;
      background: rgba(18, 28, 40, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,255,0.1);
      overflow: hidden;
    }
    .header {
      background: rgba(0, 20, 40, 0.6);
      padding: 24px 20px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(0,255,255,0.3);
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00ffff, #aa66ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .score-badge {
      background: rgba(0,200,255,0.2);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #b0f0ff;
      border: 1px solid rgba(0,255,255,0.4);
      display: inline-block;
      flex: 1;
      text-align: center;
    }
    .timer {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #00ffcc;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(0,255,255,0.3);
    }
    .hints {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .hint-btn {
      background: rgba(0,200,255,0.1);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b0f0ff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .hint-btn:hover {
      background: rgba(0,200,255,0.3);
      border-color: #00ffff;
    }
    .hint-btn.disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .tabs {
      display: flex;
      margin: 14px 20px 0;
      gap: 8px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 40px;
      background: rgba(25,35,55,0.6);
      color: #88aacc;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(90deg, #00ccff22, #7a2eff22);
      border-color: #00ccff;
      color: #00ffff;
    }
    .question-panel { padding: 28px 24px 20px; }
    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.35;
      color: #f2f6ff;
      text-align: center;
      margin-bottom: 28px;
      background: rgba(0,0,0,0.2);
      padding: 12px 16px;
      border-radius: 32px;
    }
    .answers-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }
    .answer-btn {
      background: rgba(25,35,55,0.9);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 500;
      color: #eef5ff;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2,0.9,0.4,1.1);
    }
    .answer-btn:hover {
      background: rgba(0,200,255,0.15);
      border-color: #00ffff;
      transform: scale(1.02);
    }
    .answer-btn.selected {
      background: linear-gradient(95deg, #00ccff, #7a2eff);
      border-color: #ffffff;
      color: white;
      box-shadow: 0 0 12px rgba(0,200,255,0.6);
    }
    .action-area { padding: 0 24px 28px; text-align: center; }
    .message-box {
      background: rgba(0,0,0,0.6);
      border-radius: 28px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .message-box.correct { border-left: 5px solid #00ffaa; color: #c0ffee; background: rgba(0,255,170,0.1); }
    .message-box.wrong { border-left: 5px solid #ff4d4d; color: #ffc0c0; background: rgba(255,77,77,0.1); }
    .next-btn {
      background: linear-gradient(90deg, #00ccff, #7a2eff);
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 14px rgba(0,200,255,0.3);
      margin-top: 8px;
    }
    .loader { text-align: center; padding: 50px 24px; color: #88aaff; font-size: 1rem; }
    .finish-card { text-align: center; padding: 20px; }
    .finish-score {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffd966, #ffaa44);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 16px 0;
    }
    .leaderboard-panel { padding: 20px 20px 28px; }
    .my-card {
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 28px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    .my-card-name { font-size: 1.1rem; font-weight: 700; color: #00ffff; margin-bottom: 10px; }
    .my-card-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-pill {
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: #b0d0ff;
      border: 1px solid rgba(0,255,255,0.2);
    }
    .leaderboard-title { font-size: 0.85rem; font-weight: 600; color: #5599bb; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 20px;
      margin-bottom: 6px;
      background: rgba(25,35,55,0.6);
      border: 1px solid rgba(0,255,255,0.1);
    }
    .lb-row.me { border-color: rgba(0,255,255,0.5); background: rgba(0,200,255,0.1); }
    .lb-rank { font-size: 0.9rem; font-weight: 800; color: #5599bb; min-width: 24px; text-align: center; }
    .lb-rank.gold { color: #ffd700; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name { flex: 1; font-size: 0.95rem; font-weight: 500; color: #ddeeff; }
    .lb-score { font-size: 0.9rem; font-weight: 700; color: #00ffcc; }
    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 14px;
      color: #88aadd;
      border-top: 1px solid rgba(0,255,255,0.2);
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
<div class="app-card" id="appRoot">
  <div class="header">
    <h1>🧠 NEURON</h1>
    <div class="score-row">
      <div class="score-badge" id="totalScoreBadge">🏆 0 токенов</div>
      <div class="score-badge" id="gameScoreBadge">🎯 Игра: 0</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tabGame" onclick="switchTab('game')">🎮 Игра</button>
      <button class="tab-btn" id="tabLeader" onclick="switchTab('leaderboard')">🏅 Рейтинг</button>
    </div>
  </div>
  <div id="dynamicContent"><div class="loader">✨ Загрузка вопросов...</div></div>
  <footer>интеллектуальная викторина • зарабатывай токены</footer>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const BASE_URL = 'https://neuronl.bothost.tech';
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.MainButton.hide();

  const tgUser = tg.initDataUnsafe?.user;
  const userId = tgUser?.id || Math.floor(Math.random() * 1000000);
  const userName = tgUser?.first_name || 'Игрок';
  const initData = tg.initData;

  let currentTab = 'game';
  let currentState = {
    currentQuestion: null,
    selectedAnswer: null,
    answered: false,
    totalScore: 0,
    gameScore: 0,
    timer: null,
    currentOptions: null,
    hintsUsed: []
  };

  const root = document.getElementById('dynamicContent');
  const totalScoreSpan = document.getElementById('totalScoreBadge');
  const gameScoreSpan = document.getElementById('gameScoreBadge');

  function updateScoresUI(totalScore, gameScore) {
    totalScoreSpan.innerText = `🏆 ${totalScore} токенов`;
    gameScoreSpan.innerText = `🎯 Игра: ${gameScore}`;
  }

  function switchTab(tab) {
    if (currentState.timer) {
      clearInterval(currentState.timer);
      currentState.timer = null;
    }
    currentTab = tab;
    document.getElementById('tabGame').classList.toggle('active', tab === 'game');
    document.getElementById('tabLeader').classList.toggle('active', tab === 'leaderboard');
    if (tab === 'game') {
      loadFirstQuestion();
    } else {
      loadLeaderboard();
    }
  }

  function showFinish(score, total) {
    root.innerHTML = `
      <div class="finish-card">
        <div class="question-text">🎉 Викторина завершена!</div>
        <div class="finish-score">${score} / ${total * 10}</div>
        <div style="margin: 16px 0 10px; color:#88aacc;">Вы ответили на все вопросы</div>
        <button class="next-btn" id="restartBtn">🔄 Играть снова</button>
        <button class="next-btn" style="margin-top:10px; background: rgba(0,200,255,0.15); color:#00ffff;" id="toLeaderBtn">🏅 Посмотреть рейтинг</button>
      </div>
    `;
    document.getElementById('restartBtn')?.addEventListener('click', () => {
      fetch(`${BASE_URL}/api/answer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': initData },
        body: JSON.stringify({ user_id: userId, answer: 'reset', name: userName })
      }).finally(() => loadFirstQuestion());
    });
    document.getElementById('toLeaderBtn')?.addEventListener('click', () => switchTab('leaderboard'));
  }
