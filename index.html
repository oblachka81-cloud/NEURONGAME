<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEURON — умная викторина</title>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js" defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #0b1120 0%, #0a0f1a 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }
    .app-card {
      max-width: 560px;
      width: 100%;
      background: rgba(18, 28, 40, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,255,0.1);
      overflow: hidden;
    }
    .header {
      background: rgba(0, 20, 40, 0.6);
      padding: 24px 20px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(0,255,255,0.3);
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00ffff, #aa66ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .score-badge {
      background: rgba(0,200,255,0.2);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #b0f0ff;
      border: 1px solid rgba(0,255,255,0.4);
      display: inline-block;
      flex: 1;
      text-align: center;
    }
    .games-left-badge {
      background: rgba(255,200,0,0.2);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #ffdd88;
      border: 1px solid rgba(255,200,0,0.4);
      display: inline-block;
      flex: 1;
      text-align: center;
    }
    .timer {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #00ffcc;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(0,255,255,0.3);
    }
    .hints {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .hint-btn {
      background: rgba(0,200,255,0.1);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b0f0ff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .hint-btn:hover { background: rgba(0,200,255,0.3); border-color: #00ffff; }
    .hint-btn.disabled { opacity: 0.5; pointer-events: none; }
    .tabs { display: flex; margin: 14px 20px 0; gap: 8px; }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 40px;
      background: rgba(25,35,55,0.6);
      color: #88aacc;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(90deg, #00ccff22, #7a2eff22);
      border-color: #00ccff;
      color: #00ffff;
    }
    .question-panel { padding: 28px 24px 20px; }
    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.35;
      color: #f2f6ff;
      text-align: center;
      margin-bottom: 28px;
      background: rgba(0,0,0,0.2);
      padding: 12px 16px;
      border-radius: 32px;
    }
    .answers-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    .answer-btn {
      background: rgba(25,35,55,0.9);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 500;
      color: #eef5ff;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2,0.9,0.4,1.1);
    }
    .answer-btn:hover { background: rgba(0,200,255,0.15); border-color: #00ffff; transform: scale(1.02); }
    .answer-btn.selected {
      background: linear-gradient(95deg, #00ccff, #7a2eff);
      border-color: #ffffff;
      color: white;
      box-shadow: 0 0 12px rgba(0,200,255,0.6);
    }
    @keyframes flashGreen {
      0% { background: rgba(25,35,55,0.9); }
      40% { background: #00cc66; box-shadow: 0 0 24px rgba(0,255,136,0.8); transform: scale(1.04); }
      100% { background: #00aa55; box-shadow: 0 0 16px rgba(0,200,100,0.5); transform: scale(1); }
    }
    @keyframes flashRed {
      0% { background: rgba(25,35,55,0.9); }
      40% { background: #ff3333; box-shadow: 0 0 24px rgba(255,68,68,0.8); transform: scale(0.97); }
      100% { background: #cc2222; box-shadow: 0 0 16px rgba(200,50,50,0.5); transform: scale(1); }
    }
    .answer-btn.correct {
      animation: flashGreen 0.6s ease forwards;
      background: #00aa55 !important;
      border-color: #00ff88 !important;
      color: white !important;
      pointer-events: none;
    }
    .answer-btn.wrong {
      animation: flashRed 0.6s ease forwards;
      background: #cc2222 !important;
      border-color: #ff4444 !important;
      color: white !important;
      pointer-events: none;
    }
    .action-area { padding: 0 24px 28px; text-align: center; }
    .message-box {
      background: rgba(0,0,0,0.6);
      border-radius: 28px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .message-box.correct { border-left: 5px solid #00ffaa; color: #c0ffee; background: rgba(0,255,170,0.1); }
    .message-box.wrong { border-left: 5px solid #ff4d4d; color: #ffc0c0; background: rgba(255,77,77,0.1); }
    .next-btn {
      background: linear-gradient(90deg, #00ccff, #7a2eff);
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 14px rgba(0,200,255,0.3);
      margin-top: 8px;
    }
    .loader { text-align: center; padding: 50px 24px; color: #88aaff; font-size: 1rem; }
    .leaderboard-panel { padding: 20px 20px 28px; }
    .my-card {
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 28px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    .my-card-name { font-size: 1.1rem; font-weight: 700; color: #00ffff; margin-bottom: 10px; }
    .my-card-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-pill {
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: #b0d0ff;
      border: 1px solid rgba(0,255,255,0.2);
    }
    .leaderboard-title { font-size: 0.85rem; font-weight: 600; color: #5599bb; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 20px;
      margin-bottom: 6px;
      background: rgba(25,35,55,0.6);
      border: 1px solid rgba(0,255,255,0.1);
    }
    .lb-row.me { border-color: rgba(0,255,255,0.5); background: rgba(0,200,255,0.1); }
    .lb-rank { font-size: 0.9rem; font-weight: 800; color: #5599bb; min-width: 24px; text-align: center; }
    .lb-rank.gold { color: #ffd700; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name { flex: 1; font-size: 0.95rem; font-weight: 500; color: #ddeeff; }
    .lb-score { font-size: 0.9rem; font-weight: 700; color: #00ffcc; }
    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 14px;
      color: #88aadd;
      border-top: 1px solid rgba(0,255,255,0.2);
      background: rgba(0,0,0,0.3);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(0,200,255,0.4); }
      50% { box-shadow: 0 0 28px rgba(122,46,255,0.8); }
    }
    @keyframes badgePop {
      0% { transform: scale(0.8); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .welcome-card { text-align: center; padding: 28px 24px; animation: fadeInUp 0.5s ease forwards; }
    .welcome-title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00ffff, #aa66ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .welcome-phrase { font-size: 1rem; color: #88aacc; line-height: 1.6; margin-bottom: 24px; min-height: 48px; }
    .welcome-badges { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; }
    .welcome-badge {
      background: rgba(0,200,255,0.15);
      border: 1px solid rgba(0,255,255,0.4);
      border-radius: 60px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #b0f0ff;
      animation: badgePop 0.4s ease forwards;
      opacity: 0;
    }
    .welcome-badge:nth-child(2) { animation-delay: 0.15s; }
    .wallet-btn {
      background: linear-gradient(90deg, #0088cc, #0044aa);
      border: none;
      border-radius: 60px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .wallet-btn:hover { opacity: 0.85; }
    .wallet-btn.connected {
      background: linear-gradient(90deg, #005522, #00aa55);
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }
    .withdraw-btn {
      background: linear-gradient(90deg, #00aa55, #007733);
      border: none;
      border-radius: 60px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .withdraw-btn:hover { opacity: 0.85; }
    .withdraw-btn.disabled { background: rgba(255,255,255,0.1); color: #668899; cursor: not-allowed; }
    .withdraw-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,20,40,0.95);
      border: 1px solid rgba(0,200,255,0.3);
      border-radius: 16px;
      padding: 14px 24px;
      font-size: 0.95rem;
      color: #00ccff;
      text-align: center;
      z-index: 999;
      animation: fadeInUp 0.3s ease forwards;
      max-width: 280px;
    }
    #startNewBtn {
      background: linear-gradient(90deg, #00ccff, #7a2eff);
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      width: 100%;
      animation: glowPulse 2s ease-in-out infinite;
    }
    /* === Супер игра === */
    .super-game-card {
      background: linear-gradient(135deg, rgba(255,170,0,0.08), rgba(255,80,0,0.08));
      border: 1px solid rgba(255,170,0,0.35);
      border-radius: 28px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .super-game-title { font-size: 0.95rem; font-weight: 700; color: #ffcc44; margin-bottom: 4px; }
    .super-game-desc { font-size: 0.78rem; color: #aa8833; margin-bottom: 14px; }
    .super-game-btns { display: flex; gap: 10px; }
    .stars-btn {
      flex: 1;
      background: linear-gradient(90deg, #f5a623, #f7c948);
      border: none;
      border-radius: 40px;
      padding: 12px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #1a0d00;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .stars-btn:hover { opacity: 0.85; }
    .usdt-btn {
      flex: 1;
      background: linear-gradient(90deg, #00aa88, #00ddaa);
      border: none;
      border-radius: 40px;
      padding: 12px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .usdt-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
<div class="app-card" id="appRoot">
  <div class="header">
    <h1>🧠 NEURON</h1>
    <div class="score-row">
      <div class="score-badge" id="totalScoreBadge">🏆 0 токенов</div>
      <div class="games-left-badge" id="gamesLeftBadge">🎮 Игр сегодня: 5</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tabGame" onclick="switchTab('game')">🎮 Игра</button>
      <button class="tab-btn" id="tabLeader" onclick="switchTab('leaderboard')">🏅 Рейтинг</button>
    </div>
  </div>
  <div id="dynamicContent"><div class="loader">✨ Загрузка...</div></div>
  <footer>интеллектуальная викторина • зарабатывай токены</footer>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const BASE_URL = 'https://neuronl.bothost.tech';
  const tg = window.Telegram?.WebApp ?? {
    expand: () => {},
    MainButton: { hide: () => {} },
    initDataUnsafe: {},
    initData: '',
    showAlert: (msg) => alert(msg),
    openInvoice: (url, cb) => { window.open(url); cb && cb('cancelled'); }
  };
  try { tg.expand(); } catch(e) {}
  try { tg.MainButton.hide(); } catch(e) {}

  let userId, userName;
  const savedId = localStorage.getItem('neuron_uid');
  const savedName = localStorage.getItem('neuron_uname');

  function parseTgUser() {
    // Способ 0: параметры URL (переданы ботом)
    try {
      const urlParams = new URLSearchParams(window.location.search);
      const urlUid = urlParams.get('uid');
      const urlName = urlParams.get('uname');
      if (urlUid) return { id: urlUid, first_name: decodeURIComponent(urlName || 'Игрок') };
    } catch(e) {}
    // Способ 1: initDataUnsafe
    const u = tg.initDataUnsafe?.user;
    if (u?.id) return u;
    // Способ 2: ручной парсинг initData
    try {
      const raw = tg.initData;
      if (raw && raw.length > 0) {
        const params = new URLSearchParams(raw);
        const userStr = params.get('user');
        if (userStr) return JSON.parse(decodeURIComponent(userStr));
      }
    } catch(e) {}
    return null;
  }

  const getInitData = () => tg.initData || '';

  let tonConnectUI = null;
  function initTonConnect() {
    if (tonConnectUI) return;
    try {
      if (typeof TON_CONNECT_UI === 'undefined') return;
      tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://neuronl.bothost.tech/tonconnect-manifest.json'
      });
      tonConnectUI.onStatusChange(wallet => {
        updateWalletBtn(wallet);
        if (document.querySelector('.welcome-card')) {
          showWelcome(currentState.totalScore, currentState.gamesPlayed || 0);
        }
      });
      if (document.querySelector('.welcome-card')) updateWalletBtn(tonConnectUI.wallet);
    } catch(e) { console.warn('TON Connect не загружен:', e); }
  }
  initTonConnect();
  window.addEventListener('load', () => { initTonConnect(); });

  function updateWalletBtn(wallet) {
    const btn = document.getElementById('walletBtn');
    if (!btn) return;
    if (!tonConnectUI) {
      btn.onclick = () => { initTonConnect(); if (tonConnectUI) tonConnectUI.openModal(); };
      return;
    }
    if (wallet) {
      const addr = wallet.account.address;
      const short = addr.slice(0, 6) + '...' + addr.slice(-4);
      btn.textContent = `✅ ${short}`;
      btn.classList.add('connected');
      btn.onclick = () => { if (confirm('Отключить кошелёк?')) tonConnectUI.disconnect(); };
    } else {
      btn.textContent = '💎 Подключить кошелёк';
      btn.classList.remove('connected');
      btn.onclick = () => tonConnectUI.openModal();
    }
  }

  function showToast(message, duration = 3000) {
    const existing = document.querySelector('.withdraw-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'withdraw-toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  let currentTab = 'game';
  let currentState = {
    currentQuestion: null,
    selectedAnswer: null,
    answered: false,
    totalScore: 0,
    gameScore: 0,
    timer: null,
    timeLeft: 15,
    currentOptions: null,
    hintsUsed: [],
    gamesPlayed: 0,
    freeGamesLeft: 5,
    superGamePending: false,
    superGamesTotal: 0
  };

  const root = document.getElementById('dynamicContent');
  const totalScoreSpan = document.getElementById('totalScoreBadge');
  const gamesLeftSpan = document.getElementById('gamesLeftBadge');

  function updateScoresUI(totalScore) { totalScoreSpan.innerText = `🏆 ${totalScore} токенов`; }
  function updateGamesLeftUI(n) { gamesLeftSpan.innerText = `🎮 Игр сегодня: ${n}`; }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabGame').classList.toggle('active', tab === 'game');
    document.getElementById('tabLeader').classList.toggle('active', tab === 'leaderboard');
    if (currentState.timer) { clearInterval(currentState.timer); currentState.timer = null; }
    if (tab === 'leaderboard') loadLeaderboard();
    else loadWelcome();
  }

  function showWelcome(totalScore, gamesPlayed) {
    const phrases = [
      "Твой мозг просит тренировки 💪","Сегодня умнее, чем вчера 🧬",
      "Каждый вопрос — новый нейрон 🔥","Готов побить свой рекорд? ⚡",
      "Знания = токены. Погнали! 🚀","Прокачай интеллект прямо сейчас 🎯"
    ];
    const phrase = phrases[Math.floor(Math.random() * phrases.length)];
    const wallet = tonConnectUI ? tonConnectUI.wallet : null;
    const MIN_WITHDRAW = 500;
    let withdrawHtml = '';
    if (wallet) {
      withdrawHtml = totalScore >= MIN_WITHDRAW
        ? `<button class="withdraw-btn" id="withdrawBtn">💸 Вывести ${totalScore} NEURON</button>`
        : `<button class="withdraw-btn disabled" id="withdrawBtn" disabled>💸 Нужно ещё ${MIN_WITHDRAW - totalScore} токенов</button>`;
    }

    const freeGamesLeft = currentState.freeGamesLeft;
    const isFirstSuperGame = currentState.superGamesTotal === 0;

    const superGameCard = `
      <div class="super-game-card">
        <div class="super-game-title">🔥 Супер игра</div>
        <div class="super-game-desc">${isFirstSuperGame ? 'Первая игра — x10 токенов за вопрос!' : 'x3 токена за вопрос'}</div>
        <div class="super-game-btns">
          <button class="stars-btn" id="buyStarsBtn">⭐ 100 Stars</button>
          <button class="usdt-btn" disabled style="opacity:0.5;cursor:not-allowed">💎 1 USDT скоро</button>
        </div>
      </div>`;

    let startBtnHtml = '';
    if (currentState.superGamePending) {
      startBtnHtml = `<button id="startNewBtn">🔥 Начать супер игру!</button>`;
    } else if (freeGamesLeft > 0) {
      startBtnHtml = `<button id="startNewBtn">🚀 Начать игру (осталось ${freeGamesLeft})</button>`;
    } else {
      startBtnHtml = `<button id="startNewBtn" disabled style="opacity:0.5;pointer-events:none;">⛔ Лимит игр на сегодня (5/5)</button>`;
    }

    root.innerHTML = `
      <div class="welcome-card">
        <div class="welcome-title">🧠 NEURON</div>
        <div class="welcome-phrase">${phrase}</div>
        <div class="welcome-badges">
          <div class="welcome-badge" id="tokenBadge">🏆 0 токенов</div>
          <div class="welcome-badge">🎮 ${gamesPlayed} игр</div>
        </div>
        ${superGameCard}
        <button class="wallet-btn" id="walletBtn">💎 Подключить кошелёк</button>
        ${withdrawHtml}
        ${startBtnHtml}
      </div>
    `;

    const tokenEl = document.getElementById('tokenBadge');
    let current = 0;
    const step = Math.max(1, Math.ceil(totalScore / 40));
    const counter = setInterval(() => {
      current = Math.min(current + step, totalScore);
      tokenEl.innerText = `🏆 ${current} токенов`;
      if (current >= totalScore) clearInterval(counter);
    }, 30);

    updateWalletBtn(wallet);

    const withdrawBtn = document.getElementById('withdrawBtn');
    if (withdrawBtn && !withdrawBtn.disabled) {
      withdrawBtn.addEventListener('click', () => showToast('🚀 Вывод откроется после запуска токена NEURON!', 4000));
    }

    // === Stars кнопка ===
    const starsBtn = document.getElementById('buyStarsBtn');
    if (starsBtn) {
      starsBtn.addEventListener('click', async () => {
        starsBtn.disabled = true;
        starsBtn.textContent = '⏳ ...';
        try {
          const res = await fetch(`${BASE_URL}/api/create-stars-invoice`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
            body: JSON.stringify({ user_id: userId })
          });
          const data = await res.json();
          if (data.error) {
            showToast(`⚠️ ${data.error}`, 3000);
            starsBtn.disabled = false;
            starsBtn.textContent = '⭐ 100 Stars';
            return;
          }
          tg.openInvoice(data.link, (status) => {
            if (status === 'paid') {
              showToast('✅ Оплата прошла! Нажми "Начать игру"', 4000);
              currentState.superGamePending = true;
              currentState.superGamesTotal += 1;
              setTimeout(() => loadWelcome(), 500);
            } else if (status === 'cancelled') {
              showToast('Оплата отменена', 2000);
            } else if (status === 'failed') {
              showToast('⚠️ Ошибка оплаты', 3000);
            }
            starsBtn.disabled = false;
            starsBtn.textContent = '⭐ 100 Stars';
          });
        } catch(e) {
          showToast('⚠️ Ошибка подключения', 3000);
          starsBtn.disabled = false;
          starsBtn.textContent = '⭐ 100 Stars';
        }
      });
    }

    const startBtn = document.getElementById('startNewBtn');
    if (startBtn && !startBtn.disabled) {
      startBtn.addEventListener('click', () => {
        clearInterval(counter);
        fetch(`${BASE_URL}/api/answer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
          body: JSON.stringify({ user_id: userId, answer: 'reset', name: userName })
        }).then(r => r.json()).then(data => {
          if (data.noGamesLeft) showToast('⛔ Лимит игр на сегодня исчерпан!', 3000);
          else loadFirstQuestion();
        }).catch(() => loadFirstQuestion());
      });
    }
  }

  async function useHint(hintType) {
    if (currentState.answered) return;
    const response = await fetch(`${BASE_URL}/api/use-hint`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
      body: JSON.stringify({ user_id: userId, hint: hintType })
    });
    const data = await response.json();
    if (data.error) { tg.showAlert(data.error); return; }
    currentState.hintsUsed.push(hintType);
    if (hintType === '5050') {
      document.querySelectorAll('.answer-btn').forEach((btn, idx) => {
        if (data.removedIndices.includes(idx)) btn.style.display = 'none';
      });
      const btn = document.getElementById('hint5050');
      if (btn) { btn.classList.add('disabled'); btn.disabled = true; }
    } else if (hintType === 'replace') {
      if (currentState.timer) { clearInterval(currentState.timer); currentState.timer = null; }
      currentState.answered = false;
      currentState.selectedAnswer = null;
      currentState.currentQuestion = data.newQuestion;
      renderQuestion(data.newQuestion, 0, 0, currentState.gameScore);
      const btn = document.getElementById('hintReplace');
      if (btn) { btn.classList.add('disabled'); btn.disabled = true; }
    }
    updateScoresUI(data.newScore);
    currentState.totalScore = data.newScore;
  }

  function renderQuestion(question, index, total, currentGameScore, startTime = 15) {
    currentState.currentQuestion = question;
    currentState.currentOptions = question.options;
    currentState.timeLeft = startTime;
    gamesLeftSpan.innerText = `🏅 Очки: ${currentGameScore}`;
    root.innerHTML = `
      <div class="question-panel">
        <div class="question-text">${escapeHtml(question.text)}</div>
        <div class="hints">
          <button class="hint-btn" id="hint5050">50/50 (5 токенов)</button>
          <button class="hint-btn" id="hintReplace">Заменить вопрос (10 токенов)</button>
        </div>
        <div class="answers-grid">
          ${question.options.map((opt, i) => `<button class="answer-btn" data-opt-index="${i}">${escapeHtml(opt)}</button>`).join('')}
        </div>
      </div>
      <div class="action-area">
        <div id="resultMessage" class="message-box" style="display:none;"></div>
        <button id="submitAnswerBtn" class="next-btn" style="display:none;">✅ Ответить</button>
      </div>
    `;
    const btns = document.querySelectorAll('.answer-btn');
    const submitBtn = document.getElementById('submitAnswerBtn');
    const messageDiv = document.getElementById('resultMessage');
    const hint5050 = document.getElementById('hint5050');
    const hintReplace = document.getElementById('hintReplace');
    hint5050.onclick = () => useHint('5050');
    hintReplace.onclick = () => useHint('replace');
    if (currentState.hintsUsed.includes('5050')) { hint5050.classList.add('disabled'); hint5050.disabled = true; }
    if (currentState.hintsUsed.includes('replace')) { hintReplace.classList.add('disabled'); hintReplace.disabled = true; }

    let timeLeft = startTime;
    const timerDiv = document.createElement('div');
    timerDiv.className = 'timer';
    timerDiv.innerText = `⏱️ ${timeLeft} с`;
    document.querySelector('.action-area').prepend(timerDiv);
    const timerInterval = setInterval(() => {
      timeLeft--;
      currentState.timeLeft = timeLeft;
      timerDiv.innerText = `⏱️ ${timeLeft} с`;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerDiv.innerText = '⏱️ 0 с';
        if (!currentState.answered) sendAnswer(null);
      }
    }, 1000);
    currentState.timer = timerInterval;

    btns.forEach(btn => btn.addEventListener('click', () => {
      if (currentState.answered) return;
      btns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      currentState.selectedAnswer = btn.innerText;
      submitBtn.style.display = 'block';
      messageDiv.style.display = 'none';
    }));
    submitBtn.onclick = () => {
      if (!currentState.selectedAnswer || currentState.answered) return;
      sendAnswer(Array.from(btns).findIndex(b => b.classList.contains('selected')));
    };
  }

  function sendAnswer(selectedIndex) {
    if (currentState.answered) return;
    currentState.answered = true;
    if (currentState.timer) { clearInterval(currentState.timer); currentState.timer = null; }
    const btns = document.querySelectorAll('.answer-btn');
    btns.forEach(btn => btn.disabled = true);
    const selectedBtn = (selectedIndex !== null && btns[selectedIndex]) ? btns[selectedIndex] : null;
    const submitBtn = document.getElementById('submitAnswerBtn');
    const messageDiv = document.getElementById('resultMessage');
    if (submitBtn) submitBtn.style.display = 'none';
    if (messageDiv) { messageDiv.style.display = 'block'; messageDiv.className = 'message-box'; messageDiv.innerText = '🔍 проверка...'; }

    fetch(`${BASE_URL}/api/answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
      body: JSON.stringify({ user_id: userId, name: userName, answer: selectedBtn ? selectedBtn.innerText : '' })
    }).then(r => r.json()).then(data => {
      if (data.error) {
        if (messageDiv) { messageDiv.innerText = `⚠️ ${data.error}`; messageDiv.classList.add('wrong'); }
        if (btns[data.correctIndex]) btns[data.correctIndex].classList.add('correct');
        return;
      }
      if (messageDiv) { messageDiv.innerText = data.message; messageDiv.classList.add(data.correct ? 'correct' : 'wrong'); }
      if (selectedBtn) {
        selectedBtn.classList.add(data.correct ? 'correct' : 'wrong');
        if (!data.correct && btns[data.correctIndex]) btns[data.correctIndex].classList.add('correct');
      } else if (btns[data.correctIndex]) {
        btns[data.correctIndex].classList.add('correct');
      }
      if (data.freeGamesLeft !== undefined) { currentState.freeGamesLeft = data.freeGamesLeft; updateGamesLeftUI(data.freeGamesLeft); }
      if (data.totalScore !== undefined) { currentState.totalScore = data.totalScore; updateScoresUI(data.totalScore); }
      if (data.score !== undefined) { currentState.gameScore = data.score; gamesLeftSpan.innerText = `🏅 Очки: ${data.score}`; }
      if (data.superGamePending !== undefined) currentState.superGamePending = data.superGamePending;
      if (data.superGamesTotal !== undefined) currentState.superGamesTotal = data.superGamesTotal;

      if (data.finished) {
        setTimeout(() => {
          updateScoresUI(data.totalScore || 0);
          showWelcome(data.totalScore || 0, data.gamesPlayed || 0);
        }, 2500);
      } else if (data.nextQuestion) {
        currentState.currentQuestion = data.nextQuestion;
        currentState.selectedAnswer = null;
        currentState.answered = false;
        setTimeout(() => renderQuestion(data.nextQuestion, data.nextIndex || 0, data.total || 10, data.score), 2500);
      }
    }).catch(() => {
      if (messageDiv) { messageDiv.innerText = '⚠️ Ошибка связи.'; messageDiv.classList.add('wrong'); }
      btns.forEach(btn => btn.disabled = false);
      currentState.answered = false;
    });
  }

  function loadFirstQuestion() {
    root.innerHTML = '<div class="loader">✨ Загрузка вопросов...</div>';
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    fetch(`${BASE_URL}/api/question?user_id=${userId}&name=${encodeURIComponent(userName)}`, {
      headers: { 'X-Telegram-Init-Data': getInitData() },
      signal: controller.signal
    }).then(r => { clearTimeout(timeout); return r.json(); }).then(data => {
      if (data.error) { root.innerHTML = '<div class="loader">⚠️ Ошибка авторизации. Перезапусти бота.</div>'; return; }
      if (data.finished) {
        updateScoresUI(data.totalScore || 0);
        if (data.noGamesLeft) showToast('⛔ Лимит игр на сегодня исчерпан!', 3000);
        if (data.freeGamesLeft !== undefined) { currentState.freeGamesLeft = data.freeGamesLeft; updateGamesLeftUI(data.freeGamesLeft); }
        showWelcome(data.totalScore || 0, data.gamesPlayed || 0);
      } else {
        currentState.currentQuestion = { text: data.text, options: data.options };
        currentState.totalScore = data.totalScore || 0;
        currentState.gameScore = data.score || 0;
        currentState.answered = false;
        currentState.selectedAnswer = null;
        currentState.hintsUsed = data.hintsUsed || [];
        currentState.gamesPlayed = data.gamesPlayed || 0;
        currentState.freeGamesLeft = data.freeGamesLeft || 5;
        updateScoresUI(currentState.totalScore);
        updateGamesLeftUI(currentState.freeGamesLeft);
        renderQuestion(currentState.currentQuestion, data.index, data.total, currentState.gameScore);
      }
    }).catch(() => { root.innerHTML = '<div class="loader">⚠️ Не удалось загрузить вопросы.</div>'; });
  }

  function loadLeaderboard() {
    root.innerHTML = '<div class="loader">⏳ Загрузка рейтинга...</div>';
    fetch(`${BASE_URL}/api/leaderboard?user_id=${userId}`, { headers: { 'X-Telegram-Init-Data': getInitData() } })
      .then(r => r.json()).then(data => renderLeaderboard(data))
      .catch(() => { root.innerHTML = '<div class="loader">⚠️ Не удалось загрузить рейтинг.</div>'; });
  }

  function renderLeaderboard(data) {
    const me = data.me, myRank = data.myRank || '—', top10 = data.top10 || [];
    const myCardHtml = me ? `
      <div class="my-card">
        <div class="my-card-name">👤 ${escapeHtml(me.name)}</div>
        <div class="my-card-stats">
          <span class="stat-pill">📍 Место: ${myRank}</span>
          <span class="stat-pill">🏆 Токенов: ${me.totalScore}</span>
          <span class="stat-pill">🎮 Игр: ${me.gamesPlayed}</span>
        </div>
      </div>` : `<div class="my-card" style="text-align:center;color:#5599bb;">Сыграйте первую игру чтобы попасть в рейтинг</div>`;
    const rankLabel = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const rankClass = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
    root.innerHTML = `
      <div class="leaderboard-panel">
        ${myCardHtml}
        <div class="leaderboard-title">Топ-10 игроков</div>
        ${top10.map((p,i) => `
          <div class="lb-row${me && String(p.id)===String(userId) ? ' me' : ''}">
            <span class="lb-rank ${rankClass(i)}">${rankLabel(i)}</span>
            <span class="lb-name">${escapeHtml(p.name)}${me && String(p.id)===String(userId) ? '<span style="color:#00ffff;font-size:.75rem;"> (ты)</span>' : ''}</span>
            <span class="lb-score">${p.totalScore} 🪙</span>
          </div>`).join('') || '<div style="color:#5599bb;text-align:center;padding:20px 0;">Пока нет игроков</div>'}
      </div>`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }

  function loadWelcome(retryCount = 0) {
    root.innerHTML = '<div class="loader">✨ Загрузка...</div>';
    fetch(`${BASE_URL}/api/question?user_id=${userId}&name=${encodeURIComponent(userName)}`, {
      headers: { 'X-Telegram-Init-Data': getInitData() }
    }).then(r => r.json()).then(data => {
      if (data.error) {
        if (retryCount < 5) setTimeout(() => loadWelcome(retryCount + 1), 700);
        else root.innerHTML = '<div class="loader">⚠️ Ошибка авторизации. Открой через бота.</div>';
        return;
      }
      currentState.totalScore = data.totalScore || 0;
      currentState.freeGamesLeft = data.freeGamesLeft !== undefined ? data.freeGamesLeft : 5;
      currentState.gamesPlayed = data.gamesPlayed || 0;
      currentState.superGamePending = data.superGamePending || false;
      currentState.superGamesTotal = data.superGamesTotal || 0;
      updateScoresUI(currentState.totalScore);
      updateGamesLeftUI(currentState.freeGamesLeft);
      showWelcome(currentState.totalScore, currentState.gamesPlayed);
    }).catch(() => {
      if (retryCount < 3) setTimeout(() => loadWelcome(retryCount + 1), 1000);
      else showWelcome(currentState.totalScore, currentState.gamesPlayed);
    });
  }

  function startApp(attempt) {
    attempt = attempt || 1;
    const tgUserRetry = parseTgUser();
    if (tgUserRetry?.id) {
      userId = String(tgUserRetry.id);
      userName = tgUserRetry.first_name || tgUserRetry.username || savedName || 'Игрок';
      localStorage.setItem('neuron_uid', userId);
      localStorage.setItem('neuron_uname', userName);
    }
    if (!userId) {
      if (attempt < 8) { setTimeout(() => startApp(attempt + 1), 300); return; }
      userId = localStorage.getItem('neuron_uid') || ('dev_' + Math.random().toString(36).slice(2, 11));
      userName = localStorage.getItem('neuron_uname') || 'Игрок';
      localStorage.setItem('neuron_uid', userId);
      localStorage.setItem('neuron_uname', userName);
    }
    loadWelcome();
  }
  setTimeout(() => startApp(1), 300);
</script>
