<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEURON — умная викторина</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b1120 0%, #0a0f1a 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app-card {
      max-width: 560px;
      width: 100%;
      background: rgba(18, 28, 40, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.1);
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .header {
      background: rgba(0, 20, 40, 0.6);
      padding: 24px 20px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 255, 255, 0.3);
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00ffff, #aa66ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .score-badge {
      background: rgba(0, 200, 255, 0.2);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #b0f0ff;
      border: 1px solid rgba(0, 255, 255, 0.4);
      margin-top: 12px;
      display: inline-block;
    }

    .question-panel {
      padding: 32px 24px 24px;
    }

    .question-text {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.35;
      color: #f2f6ff;
      text-align: center;
      margin-bottom: 32px;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 16px;
      border-radius: 32px;
      backdrop-filter: blur(4px);
    }

    .answers-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 32px;
    }

    .answer-btn {
      background: rgba(25, 35, 55, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 60px;
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 500;
      color: #eef5ff;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      backdrop-filter: blur(4px);
      font-family: inherit;
    }

    .answer-btn:hover {
      background: rgba(0, 200, 255, 0.15);
      border-color: #00ffff;
      transform: scale(1.02);
    }

    .answer-btn.selected {
      background: linear-gradient(95deg, #00ccff, #7a2eff);
      border-color: #ffffff;
      color: white;
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.6);
    }

    .action-area {
      padding: 0 24px 32px;
      text-align: center;
    }

    .message-box {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 28px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      font-weight: 500;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    .message-box.correct {
      border-left: 5px solid #00ffaa;
      color: #c0ffee;
      background: rgba(0, 255, 170, 0.1);
    }

    .message-box.wrong {
      border-left: 5px solid #ff4d4d;
      color: #ffc0c0;
      background: rgba(255, 77, 77, 0.1);
    }

    .next-btn, .retry-btn {
      background: linear-gradient(90deg, #00ccff, #7a2eff);
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      box-shadow: 0 4px 14px rgba(0, 200, 255, 0.3);
      margin-top: 8px;
    }

    .next-btn:active, .retry-btn:active {
      transform: scale(0.97);
    }

    .loader {
      text-align: center;
      padding: 60px 24px;
      color: #88aaff;
      font-size: 1rem;
    }

    .finish-card {
      text-align: center;
      padding: 20px;
    }

    .finish-score {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffd966, #ffaa44);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 20px 0;
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 16px;
      color: #88aadd;
      border-top: 1px solid rgba(0, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
<div class="app-card" id="appRoot">
  <div class="header">
    <h1>🧠 NEURON</h1>
    <div class="score-badge" id="scoreBadge">🏆 0 токенов</div>
  </div>
  <div id="dynamicContent">
    <div class="loader">✨ Загрузка вопросов...</div>
  </div>
  <footer>интеллектуальная викторина • зарабатывай токены</footer>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram.WebApp;
  tg.expand();          // развернуть на весь экран
  tg.MainButton.hide(); // кнопка не нужна, всё внутри

  let currentState = {
    userId: null,
    currentQuestion: null,
    selectedAnswer: null,
    answered: false,
    finished: false,
    score: 0
  };

  const root = document.getElementById('dynamicContent');
  const scoreSpan = document.getElementById('scoreBadge');

  // получаем ID пользователя из Telegram
  const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 1000000);

  function updateScoreUI(score) {
    scoreSpan.innerText = `🏆 ${score} токенов`;
  }

  function showLoader() {
    root.innerHTML = `<div class="loader">🌀 загрузка...</div>`;
  }

  function showFinish(score, total) {
    root.innerHTML = `
      <div class="finish-card">
        <div class="question-text">🎉 Викторина завершена!</div>
        <div class="finish-score">${score} / ${total * 10}</div>
        <div style="margin: 20px 0 10px;">Вы ответили на все вопросы</div>
        <button class="next-btn" id="restartBtn">🔄 Играть снова</button>
      </div>
    `;
    document.getElementById('restartBtn')?.addEventListener('click', () => {
      // сброс на сервере через перезагрузку
      fetch('/api/answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, answer: 'reset' }) // dummy, сервер сбросит только если есть логика
      }).finally(() => location.reload());
    });
  }

  function renderQuestion(question, index, total, currentScore) {
    const optionsHtml = question.options.map((opt, i) => `
      <button class="answer-btn" data-opt-index="${i}">${opt}</button>
    `).join('');

    root.innerHTML = `
      <div class="question-panel">
        <div class="question-text">${escapeHtml(question.text)}</div>
        <div class="answers-grid" id="answersGrid">
          ${optionsHtml}
        </div>
      </div>
      <div class="action-area">
        <div id="resultMessage" class="message-box" style="display: none;"></div>
        <button id="submitAnswerBtn" class="next-btn" style="display: none;">✅ Ответить</button>
      </div>
    `;

    // обработка выбора ответа
    const btns = document.querySelectorAll('.answer-btn');
    const submitBtn = document.getElementById('submitAnswerBtn');
    const messageDiv = document.getElementById('resultMessage');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (currentState.answered) return;
        btns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        currentState.selectedAnswer = btn.innerText;
        submitBtn.style.display = 'block';
        messageDiv.style.display = 'none';
      });
    });

    submitBtn.onclick = () => {
      if (!currentState.selectedAnswer || currentState.answered) return;
      sendAnswer(currentState.selectedAnswer);
    };
  }

  function sendAnswer(answer) {
    currentState.answered = true;
    const submitBtn = document.getElementById('submitAnswerBtn');
    const messageDiv = document.getElementById('resultMessage');
    submitBtn.style.display = 'none';
    messageDiv.style.display = 'block';
    messageDiv.className = 'message-box';
    messageDiv.innerText = '🔍 проверка...';

    fetch('/api/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, answer: answer })
    })
      .then(res => res.json())
      .then(data => {
        messageDiv.innerText = data.message;
        messageDiv.classList.add(data.correct ? 'correct' : 'wrong');
        if (data.score !== undefined) {
          currentState.score = data.score;
          updateScoreUI(data.score);
        }
        if (data.finished) {
          // игра окончена
          showFinish(data.score, data.total || 5);
        } else if (data.nextQuestion) {
          // следующий вопрос
          const next = data.nextQuestion;
          currentState.currentQuestion = next;
          currentState.selectedAnswer = null;
          currentState.answered = false;
          renderQuestion(next, data.nextIndex || 0, data.total || 5, data.score);
        } else {
          // просто показать результат, но вопроса нет – попросим перезагрузить
          const reloadBtn = document.createElement('button');
          reloadBtn.className = 'next-btn';
          reloadBtn.innerText = '➡️ Следующий вопрос';
          reloadBtn.onclick = () => location.reload();
          document.querySelector('.action-area').appendChild(reloadBtn);
        }
      })
      .catch(err => {
        messageDiv.innerText = '⚠️ Ошибка связи. Попробуйте позже.';
        messageDiv.classList.add('wrong');
        console.error(err);
      });
  }

  // Helper
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // старт: загрузить первый вопрос
  function loadFirstQuestion() {
    fetch(`/api/question?user_id=${userId}`)
      .then(res => res.json())
      .then(data => {
        if (data.finished) {
          showFinish(data.score, data.total);
          updateScoreUI(data.score);
        } else {
          currentState.currentQuestion = { text: data.text, options: data.options };
          currentState.score = data.score || 0;
          currentState.answered = false;
          currentState.selectedAnswer = null;
          updateScoreUI(currentState.score);
          renderQuestion(currentState.currentQuestion, data.index, data.total, currentState.score);
        }
      })
      .catch(err => {
        root.innerHTML = `<div class="loader">⚠️ Не удалось загрузить вопросы. Проверьте соединение.</div>`;
        console.error(err);
      });
  }

  loadFirstQuestion();
</script>
</body>
</html>
