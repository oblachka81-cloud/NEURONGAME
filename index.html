let currentLang = localStorage.getItem('neuron_lang') || 'ru';
let t = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;

function setLang(lang) {
  currentLang = lang;
  t = TRANSLATIONS[lang] || TRANSLATIONS.ru;
  localStorage.setItem('neuron_lang', lang);
  document.getElementById('langBtn').textContent = `${t.flag} ${lang.toUpperCase()}`;
  document.getElementById('tabGame').textContent = t.tabGame;
  document.getElementById('tabLeader').textContent = t.tabLeader;
  document.getElementById('footerEl').textContent = t.footer;
  document.getElementById('langModalTitle').textContent = t.selectLang;
  updateScoresUI(currentState.totalScore);
  updateGamesLeftUI(currentState.freeGamesLeft);
  renderLangGrid();
  closeLangModal();
  if (currentTab === 'leaderboard') loadLeaderboard();
  else loadWelcome();
}

function renderLangGrid() {
  const grid = document.getElementById('langGrid');
  grid.innerHTML = Object.entries(TRANSLATIONS).map(([code, tr]) =>
    `<button class="lang-opt${currentLang===code?' active':''}" onclick="setLang('${code}')">${tr.flag} ${tr.name}</button>`
  ).join('');
}

function openLangModal() {
  document.getElementById('langModalTitle').textContent = t.selectLang;
  renderLangGrid();
  document.getElementById('langOverlay').classList.add('open');
}

function closeLangModal(e) {
  if (!e || e.target === document.getElementById('langOverlay'))
    document.getElementById('langOverlay').classList.remove('open');
}

document.getElementById('langBtn').textContent = `${t.flag} ${currentLang.toUpperCase()}`;
document.getElementById('tabGame').textContent = t.tabGame;
document.getElementById('tabLeader').textContent = t.tabLeader;
document.getElementById('footerEl').textContent = t.footer;

let userId, userName;

function parseTgUser() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const urlUid = urlParams.get('uid');
    const urlName = urlParams.get('uname');
    if (urlUid) return { id: urlUid, first_name: decodeURIComponent(urlName || 'Player') };
  } catch(e) {}
  const u = tg.initDataUnsafe?.user;
  if (u?.id) return u;
  try {
    const raw = tg.initData;
    if (raw && raw.length > 0) {
      const params = new URLSearchParams(raw);
      const userStr = params.get('user');
      if (userStr) return JSON.parse(decodeURIComponent(userStr));
    }
  } catch(e) {}
  return null;
}

const getInitData = () => tg.initData || '';

let tonConnectUI = null;
function initTonConnect() {
  if (tonConnectUI) return;
  try {
    if (typeof TON_CONNECT_UI === 'undefined') return;
    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neuronl.bothost.tech/tonconnect-manifest.json' });
    tonConnectUI.onStatusChange(wallet => {
      updateWalletBtn(wallet);
      if (document.querySelector('.welcome-card')) showWelcome(currentState.totalScore, currentState.gamesPlayed||0);
    });
    if (document.querySelector('.welcome-card')) updateWalletBtn(tonConnectUI.wallet);
  } catch(e) { console.warn('TON Connect не загружен:', e); }
}
initTonConnect();
window.addEventListener('load', () => { initTonConnect(); });

function updateWalletBtn(wallet) {
  const btn = document.getElementById('walletBtn');
  if (!btn) return;
  if (!tonConnectUI) { btn.onclick = () => { initTonConnect(); if (tonConnectUI) tonConnectUI.openModal(); }; return; }
  if (wallet) {
    const addr = wallet.account.address;
    btn.textContent = `✅ ${addr.slice(0,6)}...${addr.slice(-4)}`;
    btn.classList.add('connected');
    btn.onclick = () => { if (confirm(t.disconnectWallet)) tonConnectUI.disconnect(); };
  } else {
    btn.textContent = t.connectWallet;
    btn.classList.remove('connected');
    btn.onclick = () => tonConnectUI.openModal();
  }
}

function showToast(message, duration=3000) {
  const existing = document.querySelector('.withdraw-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'withdraw-toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(),300); }, duration);
}

let currentTab = 'game';
let currentState = {
  currentQuestion:null, selectedAnswer:null, answered:false, totalScore:0,
  gameScore:0, timer:null, timeLeft:15, currentOptions:null, hintsUsed:[],
  gamesPlayed:0, freeGamesLeft:5, superGamePending:false, superGamesTotal:0
};

const root = document.getElementById('dynamicContent');
const totalScoreSpan = document.getElementById('totalScoreBadge');
const gamesLeftSpan = document.getElementById('gamesLeftBadge');

function updateScoresUI(totalScore) { totalScoreSpan.innerText = t.tokensBadge(totalScore); }
function updateGamesLeftUI(n) { gamesLeftSpan.innerText = t.gamesLeftBadge(n); }

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabGame').classList.toggle('active', tab==='game');
  document.getElementById('tabLeader').classList.toggle('active', tab==='leaderboard');
  if (currentState.timer) { clearInterval(currentState.timer); currentState.timer = null; }
  if (tab === 'leaderboard') loadLeaderboard();
  else loadWelcome();
}

function showWelcome(totalScore, gamesPlayed) {
  const phrase = t.phrases[Math.floor(Math.random()*t.phrases.length)];
  const wallet = tonConnectUI ? tonConnectUI.wallet : null;
  const MIN_WITHDRAW = 500;
  let withdrawHtml = '';
  if (wallet) {
    withdrawHtml = totalScore >= MIN_WITHDRAW
      ? `<button class="withdraw-btn" id="withdrawBtn">${t.withdraw(totalScore)}</button>`
      : `<button class="withdraw-btn disabled" id="withdrawBtn" disabled>${t.needMore(MIN_WITHDRAW-totalScore)}</button>`;
  }
  const freeGamesLeft = currentState.freeGamesLeft;
  const isFirstSuperGame = currentState.superGamesTotal === 0;
  const superGameCard = `
    <div class="super-game-card">
      <div class="super-game-title">${t.superTitle}</div>
      <div class="super-game-desc">${isFirstSuperGame ? t.superDescFirst : t.superDescNext}</div>
      <div class="super-game-btns">
        <button class="stars-btn" id="buyStarsBtn">⭐ 100 Stars</button>
        <button class="usdt-btn" disabled style="opacity:0.5;cursor:not-allowed">💎 1 USDT</button>
      </div>
    </div>`;
  let startBtnHtml = '';
  if (currentState.superGamePending) startBtnHtml = `<button id="startNewBtn">${t.startSuperBtn}</button>`;
  else if (freeGamesLeft > 0) startBtnHtml = `<button id="startNewBtn">${t.startBtn(freeGamesLeft)}</button>`;
  else startBtnHtml = `<button id="startNewBtn" disabled style="opacity:0.5;pointer-events:none;">${t.limitBtn}</button>`;

  root.innerHTML = `
    <div class="welcome-card">
      <div class="welcome-title">🧠 NEURON</div>
      <div class="welcome-phrase">${phrase}</div>
      <div class="welcome-badges">
        <div class="welcome-badge" id="tokenBadge">${t.tokensBadge(0)}</div>
        <div class="welcome-badge">${t.gameBadge(gamesPlayed)}</div>
      </div>
      ${superGameCard}
      <button class="wallet-btn" id="walletBtn">${t.connectWallet}</button>
      ${withdrawHtml}
      ${startBtnHtml}
    </div>`;

  const tokenEl = document.getElementById('tokenBadge');
  let current = 0;
  const step = Math.max(1, Math.ceil(totalScore/40));
  const counter = setInterval(() => {
    current = Math.min(current+step, totalScore);
    tokenEl.innerText = t.tokensBadge(current);
    if (current >= totalScore) clearInterval(counter);
  }, 30);

  updateWalletBtn(wallet);

  const withdrawBtn = document.getElementById('withdrawBtn');
  if (withdrawBtn && !withdrawBtn.disabled)
    withdrawBtn.addEventListener('click', () => showToast(t.withdrawToast, 4000));

  const starsBtn = document.getElementById('buyStarsBtn');
  if (starsBtn) {
    starsBtn.addEventListener('click', async () => {
      starsBtn.disabled = true; starsBtn.textContent = '⏳ ...';
      try {
        const res = await fetch(`${BASE_URL}/api/create-stars-invoice`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
          body: JSON.stringify({ user_id: userId })
        });
        const data = await res.json();
        if (data.error) { showToast(`⚠️ ${data.error}`, 3000); starsBtn.disabled=false; starsBtn.textContent='⭐ 100 Stars'; return; }
        tg.openInvoice(data.link, (status) => {
          if (status==='paid') { showToast(t.paidToast, 4000); currentState.superGamePending=true; currentState.superGamesTotal+=1; setTimeout(()=>loadWelcome(),500); }
          else if (status==='cancelled') showToast(t.cancelledToast, 2000);
          else if (status==='failed') showToast(t.failedToast, 3000);
          starsBtn.disabled=false; starsBtn.textContent='⭐ 100 Stars';
        });
      } catch(e) { showToast('⚠️ Ошибка подключения', 3000); starsBtn.disabled=false; starsBtn.textContent='⭐ 100 Stars'; }
    });
  }

  const startBtn = document.getElementById('startNewBtn');
  if (startBtn && !startBtn.disabled) {
    startBtn.addEventListener('click', () => {
      clearInterval(counter);
      fetch(`${BASE_URL}/api/answer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
        body: JSON.stringify({ user_id: userId, answer: 'reset', name: userName, lang: currentLang })
      }).then(r=>r.json()).then(data => {
        if (data.noGamesLeft) showToast(t.limitToast, 3000);
        else loadFirstQuestion();
      }).catch(()=>loadFirstQuestion());
    });
  }
}

async function useHint(hintType) {
  if (currentState.answered) return;
  const response = await fetch(`${BASE_URL}/api/use-hint`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
    body: JSON.stringify({ user_id: userId, hint: hintType })
  });
  const data = await response.json();
  if (data.error) { tg.showAlert(data.error); return; }
  currentState.hintsUsed.push(hintType);
  if (hintType === '5050') {
    document.querySelectorAll('.answer-btn').forEach((btn, idx) => { if (data.removedIndices.includes(idx)) btn.style.display='none'; });
    const btn = document.getElementById('hint5050');
    if (btn) { btn.classList.add('disabled'); btn.disabled=true; }
  } else if (hintType === 'replace') {
    if (currentState.timer) { clearInterval(currentState.timer); currentState.timer=null; }
    currentState.answered=false; currentState.selectedAnswer=null; currentState.currentQuestion=data.newQuestion;
    renderQuestion(data.newQuestion, 0, 0, currentState.gameScore);
    const btn = document.getElementById('hintReplace');
    if (btn) { btn.classList.add('disabled'); btn.disabled=true; }
  }
  updateScoresUI(data.newScore); currentState.totalScore=data.newScore;
}

function renderQuestion(question, index, total, currentGameScore, startTime=15) {
  currentState.currentQuestion = question;
  currentState.currentOptions = question.options;
  currentState.timeLeft = startTime;
  gamesLeftSpan.innerText = t.scoreBadge(currentGameScore);
  root.innerHTML = `
    <div class="question-panel">
      <div class="question-text">${escapeHtml(question.text)}</div>
      <div class="hints">
        <button class="hint-btn" id="hint5050">${t.hint5050}</button>
        <button class="hint-btn" id="hintReplace">${t.hintReplace}</button>
      </div>
      <div class="answers-grid">
        ${question.options.map((opt,i)=>`<button class="answer-btn" data-idx="${i}">${escapeHtml(opt)}</button>`).join('')}
      </div>
    </div>
    <div class="action-area">
      <div id="resultMessage" class="message-box" style="display:none;"></div>
      <button id="submitAnswerBtn" class="next-btn" style="display:none;">${t.submitBtn}</button>
    </div>`;

  const btns = document.querySelectorAll('.answer-btn');
  const submitBtn = document.getElementById('submitAnswerBtn');
  const messageDiv = document.getElementById('resultMessage');
  const hint5050 = document.getElementById('hint5050');
  const hintReplace = document.getElementById('hintReplace');
  hint5050.onclick = () => useHint('5050');
  hintReplace.onclick = () => useHint('replace');
  if (currentState.hintsUsed.includes('5050')) { hint5050.classList.add('disabled'); hint5050.disabled=true; }
  if (currentState.hintsUsed.includes('replace')) { hintReplace.classList.add('disabled'); hintReplace.disabled=true; }

  let timeLeft = startTime;
  const timerDiv = document.createElement('div');
  timerDiv.className = 'timer';
  timerDiv.innerText = `⏱️ ${timeLeft} с`;
  document.querySelector('.action-area').prepend(timerDiv);
  const timerInterval = setInterval(() => {
    timeLeft--; currentState.timeLeft=timeLeft;
    timerDiv.innerText = `⏱️ ${timeLeft} с`;
    if (timeLeft <= 0) { clearInterval(timerInterval); timerDiv.innerText='⏱️ 0 с'; if (!currentState.answered) sendAnswer(null); }
  }, 1000);
  currentState.timer = timerInterval;

  btns.forEach(btn => btn.addEventListener('click', () => {
    if (currentState.answered) return;
    btns.forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    currentState.selectedAnswer = parseInt(btn.dataset.idx);
    submitBtn.style.display='block'; messageDiv.style.display='none';
  }));
  submitBtn.onclick = () => {
    if (currentState.selectedAnswer === null || currentState.answered) return;
    sendAnswer(currentState.selectedAnswer);
  };
}

function sendAnswer(selectedIndex) {
  if (currentState.answered) return;
  currentState.answered = true;
  if (currentState.timer) { clearInterval(currentState.timer); currentState.timer=null; }
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(btn=>btn.disabled=true);
  const selectedBtn = (selectedIndex !== null && btns[selectedIndex]) ? btns[selectedIndex] : null;
  const submitBtn = document.getElementById('submitAnswerBtn');
  const messageDiv = document.getElementById('resultMessage');
  if (submitBtn) submitBtn.style.display='none';
  if (messageDiv) { messageDiv.style.display='block'; messageDiv.className='message-box'; messageDiv.innerText=t.checking; }

  fetch(`${BASE_URL}/api/answer`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': getInitData() },
    body: JSON.stringify({ user_id:userId, name:userName, answer:selectedIndex!==null?selectedIndex:'', lang:currentLang })
  }).then(r=>r.json()).then(data => {
    if (data.error) {
      if (messageDiv) { messageDiv.innerText=`⚠️ ${data.error}`; messageDiv.classList.add('wrong'); }
      if (btns[data.correctIndex]) btns[data.correctIndex].classList.add('correct');
      return;
    }
    if (messageDiv) { messageDiv.innerText=data.message; messageDiv.classList.add(data.correct?'correct':'wrong'); }
    if (selectedBtn) {
      selectedBtn.classList.add(data.correct?'correct':'wrong');
      if (!data.correct && btns[data.correctIndex]) btns[data.correctIndex].classList.add('correct');
    } else if (btns[data.correctIndex]) { btns[data.correctIndex].classList.add('correct'); }
    if (data.freeGamesLeft!==undefined) { currentState.freeGamesLeft=data.freeGamesLeft; updateGamesLeftUI(data.freeGamesLeft); }
    if (data.totalScore!==undefined) { currentState.totalScore=data.totalScore; updateScoresUI(data.totalScore); }
    if (data.score!==undefined) { currentState.gameScore=data.score; gamesLeftSpan.innerText=t.scoreBadge(data.score); }
    if (data.superGamePending!==undefined) currentState.superGamePending=data.superGamePending;
    if (data.superGamesTotal!==undefined) currentState.superGamesTotal=data.superGamesTotal;
    if (data.finished) {
      setTimeout(() => { updateScoresUI(data.totalScore||0); showWelcome(data.totalScore||0, data.gamesPlayed||0); }, 2500);
    } else if (data.nextQuestion) {
      currentState.currentQuestion=data.nextQuestion; currentState.selectedAnswer=null; currentState.answered=false;
      setTimeout(() => renderQuestion(data.nextQuestion, data.nextIndex||0, data.total||10, data.score), 2500);
    }
  }).catch(() => {
    if (messageDiv) { messageDiv.innerText=t.errConn; messageDiv.classList.add('wrong'); }
    btns.forEach(btn=>btn.disabled=false); currentState.answered=false;
  });
}

function loadFirstQuestion() {
  root.innerHTML = `<div class="loader">${t.loadingQ}</div>`;
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 10000);
  fetch(`${BASE_URL}/api/question?user_id=${userId}&name=${encodeURIComponent(userName)}&lang=${currentLang}`, {
    headers: { 'X-Telegram-Init-Data': getInitData() }, signal: controller.signal
  }).then(r=>{clearTimeout(timeout);return r.json();}).then(data => {
    if (data.error) { root.innerHTML=`<div class="loader">${t.errAuth}</div>`; return; }
    if (data.finished) {
      updateScoresUI(data.totalScore||0);
      if (data.noGamesLeft) showToast(t.limitToast, 3000);
      if (data.freeGamesLeft!==undefined) { currentState.freeGamesLeft=data.freeGamesLeft; updateGamesLeftUI(data.freeGamesLeft); }
      showWelcome(data.totalScore||0, data.gamesPlayed||0);
    } else {
      currentState.currentQuestion={text:data.text,options:data.options};
      currentState.totalScore=data.totalScore||0; currentState.gameScore=data.score||0;
      currentState.answered=false; currentState.selectedAnswer=null;
      currentState.hintsUsed=data.hintsUsed||[]; currentState.gamesPlayed=data.gamesPlayed||0;
      currentState.freeGamesLeft=data.freeGamesLeft||5;
      updateScoresUI(currentState.totalScore); updateGamesLeftUI(currentState.freeGamesLeft);
      renderQuestion(currentState.currentQuestion, data.index, data.total, currentState.gameScore);
    }
  }).catch(()=>{root.innerHTML=`<div class="loader">${t.errConn}</div>`;});
}

function loadLeaderboard() {
  root.innerHTML=`<div class="loader">${t.loadingLb}</div>`;
  fetch(`${BASE_URL}/api/leaderboard?user_id=${userId}`, { headers:{'X-Telegram-Init-Data':getInitData()} })
    .then(r=>r.json()).then(data=>renderLeaderboard(data))
    .catch(()=>{root.innerHTML=`<div class="loader">${t.errConn}</div>`;});
}

function renderLeaderboard(data) {
  const me=data.me, myRank=data.myRank||'—', top10=data.top10||[];
  const myCardHtml = me ? `
    <div class="my-card">
      <div class="my-card-name">👤 ${escapeHtml(me.name)}</div>
      <div class="my-card-stats">
        <span class="stat-pill">${t.rankLabel}: ${myRank}</span>
        <span class="stat-pill">${t.tokensLabel}: ${me.totalScore}</span>
        <span class="stat-pill">${t.gamesLabel}: ${me.gamesPlayed}</span>
      </div>
    </div>` : `<div class="my-card" style="text-align:center;color:#5599bb;">${t.noRank}</div>`;
  const rankLabel = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
  const rankClass = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
  root.innerHTML = `
    <div class="leaderboard-panel">
      ${myCardHtml}
      <div class="leaderboard-title">${t.top10}</div>
      ${top10.map((p,i)=>`
        <div class="lb-row${me&&String(p.id)===String(userId)?' me':''}">
          <span class="lb-rank ${rankClass(i)}">${rankLabel(i)}</span>
          <span class="lb-name">${escapeHtml(p.name)}${me&&String(p.id)===String(userId)?`<span style="color:#00ffff;font-size:.75rem;"> ${t.you}</span>`:''}</span>
          <span class="lb-score">${p.totalScore} 🪙</span>
        </div>`).join('')||`<div style="color:#5599bb;text-align:center;padding:20px 0;">${t.noRank}</div>`}
    </div>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

function loadWelcome(retryCount=0) {
  root.innerHTML=`<div class="loader">${t.loading}</div>`;
  fetch(`${BASE_URL}/api/question?user_id=${userId}&name=${encodeURIComponent(userName)}&lang=${currentLang}`, {
    headers:{'X-Telegram-Init-Data':getInitData()}
  }).then(r=>r.json()).then(data=>{
    if (data.error) {
      if (retryCount<5) setTimeout(()=>loadWelcome(retryCount+1),700);
      else root.innerHTML=`<div class="loader">${t.errAuth}</div>`;
      return;
    }
    currentState.totalScore=data.totalScore||0;
    currentState.freeGamesLeft=data.freeGamesLeft!==undefined?data.freeGamesLeft:5;
    currentState.gamesPlayed=data.gamesPlayed||0;
    currentState.superGamePending=data.superGamePending||false;
    currentState.superGamesTotal=data.superGamesTotal||0;
    updateScoresUI(currentState.totalScore); updateGamesLeftUI(currentState.freeGamesLeft);
    showWelcome(currentState.totalScore, currentState.gamesPlayed);
  }).catch(()=>{
    if (retryCount<3) setTimeout(()=>loadWelcome(retryCount+1),1000);
    else showWelcome(currentState.totalScore, currentState.gamesPlayed);
  });
}

function startApp(attempt) {
  attempt = attempt||1;
  const tgUser = parseTgUser();
  if (tgUser?.id) {
    userId=String(tgUser.id);
    userName=tgUser.first_name||tgUser.username||localStorage.getItem('neuron_uname')||'Player';
    localStorage.setItem('neuron_uid', userId);
    localStorage.setItem('neuron_uname', userName);
  }
  if (!userId) {
    if (attempt<8) { setTimeout(()=>startApp(attempt+1),300); return; }
    userId=localStorage.getItem('neuron_uid')||('dev_'+Math.random().toString(36).slice(2,11));
    userName=localStorage.getItem('neuron_uname')||'Player';
    localStorage.setItem('neuron_uid',userId);
    localStorage.setItem('neuron_uname',userName);
  }
  loadWelcome();
}
setTimeout(()=>startApp(1),300);
</script>
