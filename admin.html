<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURON Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b1120; font-family: -apple-system, sans-serif; color: #ddeeff; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.6rem; color: #00ffff; margin-bottom: 20px; }
    h2 { font-size: 1.1rem; color: #88aacc; margin: 24px 0 12px; text-transform: uppercase; letter-spacing: 1px; }
    .login-box { max-width: 360px; margin: 80px auto; background: rgba(18,28,40,0.8); border: 1px solid rgba(0,255,255,0.2); border-radius: 24px; padding: 32px; text-align: center; }
    input { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,255,0.3); border-radius: 40px; color: #fff; font-size: 1rem; margin-bottom: 12px; }
    button { background: linear-gradient(90deg, #00ccff, #7a2eff); border: none; border-radius: 40px; padding: 12px 24px; color: white; font-weight: 700; cursor: pointer; font-size: 0.95rem; }
    button.danger { background: rgba(255,60,60,0.2); border: 1px solid rgba(255,60,60,0.5); color: #ff8888; }
    button.small { padding: 6px 14px; font-size: 0.8rem; }
    .card { background: rgba(18,28,40,0.8); border: 1px solid rgba(0,255,255,0.15); border-radius: 20px; padding: 20px; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; color: #5599bb; padding: 8px 10px; border-bottom: 1px solid rgba(0,255,255,0.1); }
    td { padding: 8px 10px; border-bottom: 1px solid rgba(0,255,255,0.06); }
    .q-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(0,255,255,0.08); }
    .q-text { flex: 1; font-size: 0.9rem; }
    .q-correct { color: #00ffaa; font-size: 0.8rem; }
    .add-form input { margin-bottom: 8px; }
    .add-form .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    #msg { color: #00ffaa; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }
  </style>
</head>
<body>
<div id="loginView" class="login-box">
  <h1>🔐 Admin</h1>
  <input type="password" id="pwdInput" placeholder="Пароль" />
  <button onclick="login()">Войти</button>
  <div id="loginErr" style="color:#ff8888; margin-top:10px; font-size:0.85rem;"></div>
</div>
<div id="adminView" style="display:none; max-width:900px; margin:0 auto;">
  <h1>🛠️ NEURON Admin</h1>
  <div class="card">
    <h2>Игроки</h2>
    <table id="playersTable">
      <thead><tr><th>#</th><th>Имя</th><th>Общий баланс</th><th>Игр</th><th>Текущий счёт</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="card">
    <h2>Вопросы (<span id="qCount">0</span>)</h2>
    <div id="questionsList"></div>
    <h2 style="margin-top:20px;">Добавить вопрос</h2>
    <div class="add-form">
      <input id="qText" placeholder="Текст вопроса" />
      <div class="options">
        <input id="opt0" placeholder="Вариант 1" />
        <input id="opt1" placeholder="Вариант 2" />
        <input id="opt2" placeholder="Вариант 3" />
        <input id="opt3" placeholder="Вариант 4" />
      </div>
      <input id="qCorrect" placeholder="Правильный ответ (точно как в вариантах)" />
      <button onclick="addQuestion()">Добавить</button>
      <div id="msg"></div>
    </div>
  </div>
</div>
<script>
  const BASE = '';
  let pwd = '';
  function login() {
    pwd = document.getElementById('pwdInput').value;
    loadAll();
  }
  document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  function api(url, opts = {}) {
    return fetch(url, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': pwd,
        ...(opts.headers || {})
      }
    }).then(r => r.json());
  }
  function loadAll() {
    Promise.all([
      api('/api/admin/stats'),
      api('/api/admin/questions')
    ]).then(([stats, qs]) => {
      if (stats.error) {
        document.getElementById('loginErr').innerText = stats.error;
        return;
      }
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('adminView').style.display = 'block';
      renderPlayers(stats.players);
      renderQuestions(qs);
    }).catch(() => {
      document.getElementById('loginErr').innerText = 'Ошибка подключения';
    });
  }
  function renderPlayers(players) {
    const tbody = document.querySelector('#playersTable tbody');
    tbody.innerHTML = players.map((p, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${esc(p.name)}</td>
        <td>${p.totalScore} 🪙</td>
        <td>${p.gamesPlayed}</td>
        <td>${p.score}</td>
        <td><button class="small danger" onclick="resetPlayer('${p.id}')">Сброс</button></td>
      </tr>
    `).join('');
  }
  function renderQuestions(qs) {
    document.getElementById('qCount').innerText = qs.length;
    document.getElementById('questionsList').innerHTML = qs.map((q, i) => `
      <div class="q-row">
        <div style="color:#5599bb; min-width:24px;">${i + 1}</div>
        <div class="q-text">
          ${esc(q.text)}
          <div class="q-correct">✅ ${esc(q.correct)}</div>
          <div style="color:#5599bb; font-size:0.78rem;">${q.options.join(' / ')}</div>
        </div>
        <button class="small danger" onclick="deleteQuestion(${i})">Удалить</button>
      </div>
    `).join('') || '<div style="color:#5599bb;">Нет вопросов</div>';
  }
  function resetPlayer(userId) {
    if (!confirm('Сбросить прогресс игрока?')) return;
    api('/api/admin/reset-player', { method: 'POST', body: JSON.stringify({ userId }) })
      .then(() => loadAll());
  }
  function deleteQuestion(index) {
    if (!confirm('Удалить вопрос?')) return;
    api('/api/admin/questions/delete', { method: 'POST', body: JSON.stringify({ index }) })
      .then(() => loadAll());
  }
  function addQuestion() {
    const text = document.getElementById('qText').value.trim();
    const options = [0,1,2,3].map(i => document.getElementById('opt' + i).value.trim()).filter(Boolean);
    const correct = document.getElementById('qCorrect').value.trim();
    const msg = document.getElementById('msg');
    if (!text || options.length < 2 || !correct) {
      msg.style.color = '#ff8888';
      msg.innerText = 'Заполни все поля';
      return;
    }
    if (!options.includes(correct)) {
      msg.style.color = '#ff8888';
      msg.innerText = 'Правильный ответ должен совпадать с одним из вариантов';
      return;
    }
    api('/api/admin/questions/add', {
      method: 'POST',
      body: JSON.stringify({ text, options, correct })
    }).then(() => {
      msg.style.color = '#00ffaa';
      msg.innerText = 'Вопрос добавлен!';
      ['qText','opt0','opt1','opt2','opt3','qCorrect'].forEach(id => document.getElementById(id).value = '');
      loadAll();
    });
  }
  function esc(s) { return String(s || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
</script>
</body>
</html>
